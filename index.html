<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Webloom – واجهتك الرقمية بأعلى جودة وتجربة مستخدم</title>

    <!-- google fonts -->
    <link href="https://fonts.googleapis.com/css2?
        family=Tajawal:wght@300;400;500;700& 
        family=Almarai:wght@300;400;700;800& 
        family=Noto+Sans+Arabic:wght@400;700& 
        family=Mada:wght@200;400;600& 
        family=Cairo:wght@300;400;700&display=swap" 
        rel="stylesheet">

    <!-- font awesom -->
    <link rel="stylesheet" 
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">

    <!-- bootstrap link -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" 
        rel="stylesheet" 
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" 
        crossorigin="anonymous">
    <!-- css link -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- Loader -->
    <div id="loader-wrapper">
        <div class="loader"></div>
    </div>

    <!-- content -->
    <div class="content" style="display: none;">

        <!-- Navbar -->
        <nav class="navbar navbar-expand-lg" dir="rtl">
            <div class="container w-100 d-flex justify-content-between align-items-center">
                
                <!-- Brand/Logo (START) -->
                <a class="navbar-brand fw-bold" href="#">
                    <i class="fa-brands fa-webflow"></i>
                    ويبلووم
                </a>

                <!-- Custom Hamburger (for mobile) -->
                <button class="custom-toggler navbar-toggler d-lg-none" 
                        type="button" 
                        data-bs-toggle="offcanvas" 
                        data-bs-target="#offcanvasNavbar" 
                        aria-controls="offcanvasNavbar">
                    <span></span>
                    <span></span>
                    <span></span>
                </button>

                <!-- Navigation Links (END) -->
                <div class="collapse navbar-collapse" id="navbarNav">
                    <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                        <li class="nav-item">
                            <a class="nav-link active" aria-current="page" href="#">الصفحة الرئيسية</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="#">من نحن</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="#">خدماتنا</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="#">مشاريعنا</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="#">اتصل بنا</a>
                        </li>
                    </ul>
                </div>

            </div>
        </nav>

        
        <!-- Offcanvas Menu for Mobile -->
        <div class="offcanvas offcanvas-start d-lg-none" tabindex="-1" id="offcanvasNavbar" aria-labelledby="offcanvasNavbarLabel" data-bs-backdrop="true" data-bs-scroll="true">
            <div class="offcanvas-header">
                <h5 class="offcanvas-title fw-bold" id="offcanvasNavbarLabel">
                    <i class="fa-brands fa-webflow"></i>
                    ويبلووم
                </h5>
            </div>
            <div class="offcanvas-body">
                <ul class="navbar-nav justify-content-end flex-grow-1 pe-3">
                    <li class="nav-item">
                        <a class="nav-link active" aria-current="page" href="#" data-bs-dismiss="offcanvas">الصفحة الرئيسية</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#" data-bs-dismiss="offcanvas">من نحن</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#" data-bs-dismiss="offcanvas">خدماتنا</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#" data-bs-dismiss="offcanvas">مشاريعنا</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#" data-bs-dismiss="offcanvas">اتصل بنا</a>
                    </li>
                </ul>
            </div>
        </div>

    </div>

    <!-- Bootstrap js -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <!-- Loader js -->
    <script src="js/loader.js"></script>

</html>
